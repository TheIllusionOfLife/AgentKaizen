name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      WEAVE_PRINT_CALL_LINK: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --group dev --locked

      - name: Run tests
        run: uv run --group dev pytest

      - name: Lint
        run: uv run --group dev ruff check .

      - name: Format check
        run: uv run --group dev ruff format --check .

  test-without-weave:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync without weave extra
        run: uv sync --group dev-minimal --locked

      - name: Run tests
        run: uv run --group dev-minimal pytest
